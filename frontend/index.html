<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Legal Document Summariser</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <header>
    <div class="logo">⚖️ LegalAI</div>
    <p class="tagline">Upload any legal document — AI will summarise, classify clauses & score risk</p>
  </header>

  <section class="upload-section" id="uploadSection">
    <div class="drop-zone" id="dropZone">
      <div class="drop-icon">📄</div>
      <p class="drop-text">Drag & drop your PDF here</p>
      <p class="drop-sub">or</p>
      <button class="btn-upload" onclick="document.getElementById('fileInput').click()">Choose PDF File</button>
      <input type="file" id="fileInput" accept=".pdf" style="display:none"/>
    </div>
    <p class="file-name" id="fileName"></p>
    <button type="button" class="btn-analyse" id="analyseBtn" disabled>Analyse Document</button>
  </section>

  <div class="loading" id="loading" hidden>
    <div class="spinner"></div>
    <p id="loadingMsg">Processing...</p>
  </div>

  <section class="results" id="results" hidden>
    <div class="risk-card" id="riskCard">
      <div class="risk-left">
        <canvas id="riskGauge" width="180" height="180"></canvas>
      </div>
      <div class="risk-right">
        <h2 id="riskTitle">Risk Level</h2>
        <p id="riskDetail"></p>
        <div id="riskBadge" class="risk-badge"></div>
      </div>
    </div>

    <div class="entities-row" id="entitiesRow"></div>

    <div class="two-col">
      <div class="col">
        <h3>📝 AI Summary</h3>
        <div class="text-box" id="summaryBox"></div>
        <h3 style="margin-top:1.5rem">🔑 Key Points</h3>
        <ul class="key-points" id="keyPoints"></ul>
      </div>
      <div class="col">
        <h3>📄 Original Document (Preview)</h3>
        <div class="text-box original" id="originalBox"></div>
      </div>
    </div>

    <div class="clauses-section">
      <h3>🔍 Detected Clauses</h3>
      <div class="clauses-grid" id="clausesGrid"></div>
    </div>

    <button class="btn-reset" onclick="resetApp()">Analyse Another Document</button>
  </section>

  <script src="app.js"></script>
</body>
</html>
